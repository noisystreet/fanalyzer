[package]
name = "analysis_fund"
version = "0.1.0"
edition = "2021"
description = "A Rust-based fund analysis tool for retrieving, analyzing and visualizing fund data"
license = "MIT"
repository = "https://github.com/user/analysis_fund"
readme = "README.md"
keywords = ["fund", "finance", "analysis"]
categories = ["finance"]

[features]
default = []
web = ["dep:leptos", "dep:axum", "dep:tower", "dep:tower-http"]

[dependencies]
anyhow = "1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["json"] }
clap = { version = "4", features = ["derive"] }
toml = "0.8"
chrono = { version = "0.4", features = ["serde"] }
csv = "1"
dirs = "5"
regex = "1"
tabled = { version = "0.20", default-features = false, features = ["std", "derive"] }
leptos = { version = "0.7", default-features = false, features = ["ssr"], optional = true }
axum = { version = "0.7", optional = true, features = ["macros"] }
tower = { version = "0.4", optional = true }
tower-http = { version = "0.5", optional = true, features = ["trace"] }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
