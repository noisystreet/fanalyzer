name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Code metrics (src/tests file line budget)
        run: python3 scripts/check_code_metrics.py

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings -W clippy::cognitive_complexity -W clippy::too_many_lines

      - name: Clippy (web feature)
        run: cargo clippy --all-targets --features web -- -D warnings -W clippy::too_many_lines -A clippy::cognitive_complexity

      - name: Build
        run: cargo build

      - name: Build (web feature)
        run: cargo build --features web

      - name: Run tests
        run: cargo test

      - name: Run tests (web feature)
        run: cargo test --features web

      - name: Check for vulnerabilities
        run: cargo install cargo-audit --locked && cargo audit
