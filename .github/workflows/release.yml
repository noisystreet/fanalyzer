name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  verify-and-release:
    name: Verify & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Code metrics
        run: python3 scripts/check_code_metrics.py

      - name: Run tests
        run: cargo test --locked

      - name: Run tests (web feature)
        run: cargo test --locked --features web

      - name: Build release (CLI)
        run: cargo build --release --locked

      - name: Package CLI binary
        run: |
          install -Dm755 target/release/fanalyzer "dist/fanalyzer-${GITHUB_REF_NAME}-linux-amd64"
          tar -czf "fanalyzer-${GITHUB_REF_NAME}-linux-amd64-cli.tar.gz" -C dist "fanalyzer-${GITHUB_REF_NAME}-linux-amd64"

      - name: Build release (web)
        run: cargo build --release --locked --features web

      - name: Package web binary
        run: |
          install -Dm755 target/release/fanalyzer "dist/fanalyzer-${GITHUB_REF_NAME}-linux-amd64-web"
          tar -czf "fanalyzer-${GITHUB_REF_NAME}-linux-amd64-web.tar.gz" -C dist "fanalyzer-${GITHUB_REF_NAME}-linux-amd64-web"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            fanalyzer-*-linux-amd64-cli.tar.gz
            fanalyzer-*-linux-amd64-web.tar.gz
