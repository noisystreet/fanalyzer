# Dependabot：定期更新 Cargo 依赖与 GitHub Actions。
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
